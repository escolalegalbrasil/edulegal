<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduLegal - Chat</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="app.css">

<style>
  body {
    background: #201b2c;
    color: #f0ffffde;
  }

  .admin-shell {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    box-sizing: border-box;
  }

  .admin-card {
    width: 100%;
    max-width: 1100px;
    background: #2f2841;
    border-radius: 20px;
    box-shadow: 0px 10px 40px #00000056;
    padding: 32px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .admin-card h1 {
    margin: 0 0 4px 0;
    color: #00ff88;
  }

  .admin-card label {
    font-weight: 700;
    color: #f0ffffde;
    margin-top: 6px;
  }

  #trailSelect,
  #mentoriaTitleBox,
  #chatInput {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 15px;
    background: #514869;
    color: #f0ffffde;
    font-size: 12pt;
    box-shadow: 0px 10px 40px #00000056;
    box-sizing: border-box;
    outline: none;
  }

  #mentoriaTitleBox {
    min-height: 52px;
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 14pt;
  }

  .chat-box {
    width: 100%;
    min-height: 420px;
    border: none;
    border-radius: 10px;
    padding: 16px;
    background: #514869;
    color: #f0ffffde;
    font-size: 12pt;
    box-shadow: 0px 10px 40px #00000056;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    max-height: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-right: 4px;
  }

  .bubble {
    padding: 12px 14px;
    border-radius: 12px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.student {
    background: rgba(0, 255, 136, 0.14);
    border: 1px solid rgba(0, 255, 136, 0.25);
  }

  .bubble.assistant {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .bubble b {
    color: #00ff88;
  }

  .composer-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }

  #chatInput {
    resize: vertical;
    min-height: 90px;
  }

  .actions-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    text-transform: uppercase;
    font-weight: 800;
    letter-spacing: 1px;
    color: #2b134b;
    background: #00ff88;
    cursor: pointer;
    box-shadow: 0px 10px 40px -12px #00ff8052;
  }

  .btn.secondary {
    background: #6b5f88;
    color: #fff;
    box-shadow: none;
  }

  .status {
    margin: 0;
    color: #f0ffffde;
    font-size: 11pt;
  }

  .top-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .top-row .btn {
    flex-shrink: 0;
  }

  input[type="file"] {
    color: #f0ffffde;
  }

  .subtitle {
    margin: -4px 0 6px 0;
    color: #f0ffffb5;
    font-size: 11pt;
  }

  @media (max-width: 768px) {
    .admin-card {
      padding: 20px;
    }

    .top-row {
      flex-direction: column;
      align-items: stretch;
    }

    .actions-row {
      flex-direction: column;
      align-items: stretch;
    }

    .btn {
      width: 100%;
    }
  }
</style>
</head>

<body>

<div class="admin-shell">
  <div class="admin-card">

    <h1>Mentoria do Aluno</h1>

    <label>Selecionar mentoria:</label>
    <div class="top-row">
      <select id="trailSelect"></select>
      <button id="openTrailBtn" class="btn">Abrir</button>
      <button class="btn secondary" onclick="logout()">Sair</button>
    </div>

    <p id="trailStatus" class="status"></p>

    <label>Título da mentoria:</label>
    <div id="mentoriaTitleBox">Mentoria</div>

    <p id="mentoriaSubtitle" class="subtitle"></p>

    <label>Conversa:</label>
    <div class="chat-box">
      <div id="messages" class="messages"></div>

      <div class="composer-area">
        <textarea id="chatInput" rows="4" placeholder="Escreva aqui..."></textarea>

        <div class="actions-row">
          <input type="file" id="fileInput" accept="image/*" />
          <button id="uploadBtn" class="btn secondary">Enviar print</button>
          <button id="sendBtn" class="btn">Enviar</button>
          <span id="chatStatus" class="status"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://xhasvagsodoctsqbfwkw.supabase.co";
const supabaseKey = "sb_publishable_xkkU9fI3Gv9dpEf7kadVBw_9GrcLZzr";
window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>

<script>
(async function init() {
  const { data: sessionData } = await window.supabaseClient.auth.getSession();
  const session = sessionData?.session;

  if (!session) {
    window.location.href = "index.html";
    return;
  }

  const trailSelect = document.getElementById("trailSelect");
  const openTrailBtn = document.getElementById("openTrailBtn");
  const trailStatus = document.getElementById("trailStatus");

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const fileInput = document.getElementById("fileInput");
  const chatStatus = document.getElementById("chatStatus");

  const mentoriaTitleBox = document.getElementById("mentoriaTitleBox");
  const mentoriaSubtitleEl = document.getElementById("mentoriaSubtitle");

  let currentTrail = null;

  function extractObjective(content) {
    if (!content) return "";

    if (typeof content === "object") {
      return (
        content["Objetivo mínimo"] ||
        content.objetivo_minimo ||
        content.objetivoMinimo ||
        content.objetivo ||
        content.briefing ||
        ""
      );
    }

    if (typeof content === "string") {
      const match = content.match(/Objetivo mínimo:\s*(.+)/i);
      return match ? match[1].trim() : "";
    }

    return "";
  }

  function renderHeader(trailRow) {
    mentoriaTitleBox.textContent = trailRow.title || "Mentoria";

    const objective = extractObjective(trailRow.content);
    mentoriaSubtitleEl.textContent = objective || "";
  }

  function renderMessages(rows) {
    messagesEl.innerHTML = "";

    for (const m of rows) {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${m.role === "student" ? "student" : "assistant"}`;

      const content = m.content || "";
      const urlMatch = content.match(/https?:\/\/[^\s]+/);

      if (urlMatch && urlMatch[0].includes("/storage/v1/object/sign/evidence/")) {
        const img = document.createElement("img");
        img.src = urlMatch[0];
        img.style.maxWidth = "100%";
        img.style.marginTop = "10px";
        img.style.borderRadius = "10px";

        bubble.innerHTML = `<b>${m.role === "student" ? "Você" : "IA"}:</b><br>${content.replace(urlMatch[0], "")}`;
        bubble.appendChild(img);
      } else {
        bubble.innerHTML = `<b>${m.role === "student" ? "Você" : "IA"}:</b> ${content}`;
      }

      messagesEl.appendChild(bubble);
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadMessages() {
    if (!currentTrail) return;

    const { data: rows } = await window.supabaseClient
      .from("messages")
      .select("role,content,created_at")
      .eq("trail_id", currentTrail.id)
      .order("created_at", { ascending: true });

    renderMessages(rows || []);
  }

  async function openTrail(trailId) {
    trailStatus.textContent = "Carregando mentoria...";
    chatStatus.textContent = "";

    const { data: trailRow, error } = await window.supabaseClient
      .from("trails")
      .select("id,title,content,created_at")
      .eq("id", trailId)
      .single();

    if (error || !trailRow) {
      trailStatus.textContent = "Erro ao carregar mentoria.";
      return;
    }

    currentTrail = trailRow;
    renderHeader(trailRow);
    await loadMessages();
    trailStatus.textContent = `Aberta: ${trailRow.title}`;
  }

  async function loadTrailsList() {
    trailStatus.textContent = "Carregando lista de mentorias...";

    const { data: rows, error } = await window.supabaseClient
      .from("trails")
      .select("id,title,created_at")
      .order("created_at", { ascending: false })
      .limit(50);

    if (error) {
      trailStatus.textContent = "Erro ao carregar mentorias.";
      return;
    }

    trailSelect.innerHTML = "";

    (rows || []).forEach((t) => {
      const opt = document.createElement("option");
      const dateTxt = t.created_at ? new Date(t.created_at).toLocaleString() : "";
      opt.value = t.id;
      opt.textContent = `${t.title || "Mentoria"}${dateTxt ? " — " + dateTxt : ""}`;
      trailSelect.appendChild(opt);
    });

    if (!rows || rows.length === 0) {
      trailStatus.textContent = "Nenhuma mentoria encontrada.";
      return;
    }

    await openTrail(rows[0].id);
  }

  async function refreshTrailState() {
    if (!currentTrail) return;

    const { data: updatedTrail } = await window.supabaseClient
      .from("trails")
      .select("id,title,content,created_at")
      .eq("id", currentTrail.id)
      .single();

    if (updatedTrail) {
      currentTrail = updatedTrail;
      renderHeader(updatedTrail);
    }
  }

  async function sendMessage(text) {
    if (!currentTrail) return;
    if (!text) return;

    sendBtn.disabled = true;
    chatStatus.textContent = "Enviando...";

    const { error } = await window.supabaseClient.functions.invoke("edulegal-cha", {
      body: { trail_id: currentTrail.id, message: text }
    });

    sendBtn.disabled = false;

    if (error) {
      chatStatus.textContent = "Erro ao enviar mensagem.";
      return;
    }

    chatStatus.textContent = "";
    inputEl.value = "";

    await refreshTrailState();
    await loadMessages();
  }

  sendBtn.addEventListener("click", () => {
    sendMessage(inputEl.value.trim());
  });

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputEl.value.trim());
    }
  });

  uploadBtn.addEventListener("click", async () => {
    if (!currentTrail) return;

    const file = fileInput.files[0];
    if (!file) return;

    uploadBtn.disabled = true;
    chatStatus.textContent = "Enviando print...";

    const userId = session.user.id;
    const filePath = `${userId}/${currentTrail.id}/${Date.now()}_${file.name}`;

    const { error: uploadError } = await window.supabaseClient.storage
      .from("evidence")
      .upload(filePath, file);

    if (uploadError) {
      chatStatus.textContent = "Erro no upload.";
      uploadBtn.disabled = false;
      return;
    }

    const { data } = await window.supabaseClient.storage
      .from("evidence")
      .createSignedUrl(filePath, 3600);

    const imageUrl = data.signedUrl;

    await sendMessage(`EVIDÊNCIA_PRINT (analisar imagem): ${imageUrl}`);

    fileInput.value = "";
    uploadBtn.disabled = false;
    chatStatus.textContent = "";
  });

  openTrailBtn.addEventListener("click", async () => {
    const id = trailSelect.value;
    if (!id) return;
    await openTrail(id);
  });

  await loadTrailsList();
})();

async function logout() {
  await window.supabaseClient.auth.signOut();
  window.location.href = "index.html";
}
</script>

</body>
</html>
